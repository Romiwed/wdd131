<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables Activity</title>
    <link rel="stylesheet" href="table.css">
</head>
<body>

    <table>
        <caption>Table 1: Account Feature Comparison</caption>

        <thead>
            <tr>
                <th colspan="4" class="company">
                    ACME Wildwest Services
                </th>
            </tr>

            <tr>
                <th class="empty"></th>
                <th>Basic</th>
                <th>Premium</th>
                <th>Deluxe</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="row">Feature 1</th>
                <td class="yes">✔</td>
                <td class="yes">✔</td>
                <td class="yes">✔</td>
            </tr>

            <tr>
                <th scope="row">Feature 2</th>
                <td class="no">✕</td>
                <td class="yes">✔</td>
                <td class="yes">✔</td>
            </tr>

            <tr>
                <th scope="row">Feature 3</th>
                <td class="no">✕</td>
                <td class="no">✕</td>
                <td class="yes">✔</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
